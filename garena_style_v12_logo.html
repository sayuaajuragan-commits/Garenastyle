<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garena Style V12</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --red: #ff253a;
      --orange: #ff9d00;
      --green: #2ed573;
      --blue: #1d9bf0;
      --card: rgba(13, 13, 20, 0.76);
      --line: rgba(255, 255, 255, 0.15);
      --soft: rgba(255, 255, 255, 0.68);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      color: white;
      background:
        radial-gradient(circle at 18% 8%, rgba(255, 37, 58, 0.52), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(255, 157, 0, 0.34), transparent 27%),
        radial-gradient(circle at 50% 100%, rgba(201, 0, 25, 0.28), transparent 36%),
        linear-gradient(135deg, #030306, #0c0c14 42%, #1d0508 100%);
      overflow: hidden;
    }

    .blob {
      position: fixed;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      filter: blur(44px);
      opacity: 0.32;
      animation: float 7s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .blob.one { background: var(--red); left: -95px; top: 120px; }
    .blob.two { background: var(--orange); right: -105px; bottom: 80px; animation-delay: 1.1s; }

    @keyframes float {
      from { transform: translate3d(0, -18px, 0) scale(1); }
      to { transform: translate3d(20px, 22px, 0) scale(1.12); }
    }

    .phone {
      width: 100%;
      max-width: 430px;
      min-height: 650px;
      border-radius: 38px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.12), transparent 20%),
        var(--card);
      border: 1px solid var(--line);
      box-shadow:
        0 42px 130px rgba(0, 0, 0, 0.82),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(26px);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,.13), transparent 27%),
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.11), transparent 35%);
      pointer-events: none;
      z-index: 1;
    }

    .top-line {
      position: relative;
      height: 8px;
      background: linear-gradient(90deg, var(--red), var(--orange), var(--red));
      box-shadow: 0 0 34px rgba(255, 80, 40, 0.95);
      z-index: 5;
    }

    .page {
      display: none;
      min-height: 642px;
      padding: 32px 25px 24px;
      position: relative;
      z-index: 3;
      animation: pageIn 0.48s cubic-bezier(.2,.8,.2,1);
    }

    .page.active {
      display: flex;
      flex-direction: column;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo-card {
      width: 148px;
      height: 148px;
      border-radius: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(145deg, rgba(255,255,255,.18), transparent 35%),
        rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        0 24px 60px rgba(255, 37, 58, 0.24),
        inset 0 1px 0 rgba(255,255,255,.15);
      position: relative;
      overflow: hidden;
    }

    .logo-card::after {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 180deg, transparent, rgba(255, 37, 58, .32), transparent, rgba(255, 157, 0, .28), transparent);
      animation: spin 5.5s linear infinite;
      opacity: .7;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .logo-inner {
      width: 136px;
      height: 136px;
      border-radius: 33px;
      background: rgba(4, 4, 7, 0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      border: 1px solid rgba(255,255,255,.12);
    }

    .garena-logo {
      width: 112px;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 18px rgba(255, 37, 58, 0.65));
    }

    .status-pill {
      margin: 0 auto 18px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.11);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .5px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      line-height: 1.18;
      margin-bottom: 28px;
      font-weight: 950;
      letter-spacing: -0.6px;
    }

    .verified {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #36b7ff, #0877ff);
      font-size: 14px;
      margin-left: 5px;
      vertical-align: middle;
      box-shadow: 0 0 22px rgba(29, 155, 240, 0.65);
    }

    .form-card {
      padding: 18px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.11);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0.8px;
      margin-bottom: 9px;
      color: rgba(255, 255, 255, 0.86);
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    input, select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      outline: none;
      border-radius: 18px;
      padding: 16px;
      background: rgba(4, 4, 7, 0.46);
      color: white;
      font-size: 15px;
      transition: 0.22s;
    }

    select option { color: #111; }
    input::placeholder { color: rgba(255,255,255,.36); }

    input:focus, select:focus {
      border-color: rgba(255, 76, 60, 0.95);
      box-shadow: 0 0 0 4px rgba(255, 75, 61, 0.15);
      background: rgba(4, 4, 7, 0.62);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 19px;
      padding: 16px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), transparent 32%),
        linear-gradient(135deg, var(--red), var(--orange));
      box-shadow:
        0 18px 38px rgba(255, 70, 35, 0.34),
        inset 0 1px 0 rgba(255,255,255,.22);
      font-size: 15px;
      font-weight: 950;
      letter-spacing: 0.9px;
      cursor: pointer;
      transition: 0.25s;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -90%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
      transform: skewX(-18deg);
      transition: 0.45s;
    }

    button:hover { transform: translateY(-3px); filter: brightness(1.08); }
    button:hover::before { left: 125%; }
    button:active { transform: scale(0.98); }

    .back {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: none;
      margin-top: 18px;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 11px;
      border-radius: 15px;
      background: rgba(255, 50, 50, 0.13);
      border: 1px solid rgba(255, 50, 50, 0.3);
      color: #ffb0b0;
      font-size: 13px;
      text-align: center;
    }

    .loading-box {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.1);
    }

    .loading-text {
      font-size: 12px;
      color: var(--soft);
      margin-bottom: 10px;
      font-weight: 800;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.1);
    }

    .bar span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--red), var(--orange));
      transition: width .35s;
    }

    .success-card {
      margin-top: 28px;
      padding: 30px 18px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.1), transparent 30%),
        rgba(46, 213, 115, 0.13);
      border: 1px solid rgba(46, 213, 115, 0.35);
      text-align: center;
      box-shadow:
        0 20px 50px rgba(46, 213, 115, 0.10),
        inset 0 1px 0 rgba(255,255,255,.12);
    }

    .success-icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(46, 213, 115, 0.16);
      font-size: 42px;
      box-shadow: 0 0 40px rgba(46, 213, 115, 0.18);
    }

    .success-title {
      font-size: 25px;
      font-weight: 950;
      margin-bottom: 10px;
      letter-spacing: -0.4px;
    }

    .success-text {
      font-size: 15px;
      color: #d8ffd8;
      line-height: 1.75;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 18px;
    }

    .summary-item {
      flex: 1;
      padding: 13px 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      text-align: center;
    }

    .summary-item span {
      display: block;
      color: var(--soft);
      font-size: 11px;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .summary-item b {
      font-size: 13px;
      word-break: break-word;
    }

    .spacer { flex: 1; }

    @media (max-width: 430px) {
      .phone { min-height: 620px; border-radius: 30px; }
      .page { min-height: 612px; padding: 30px 21px 24px; }
      h1 { font-size: 24px; }
      .logo-card { width: 132px; height: 132px; }
      .logo-inner { width: 121px; height: 121px; }
      .garena-logo { width: 100px; }
    }
  </style>
</head>

  <script>
    const KUNCI_BENAR = "Bandakunv12";

    function pindahHalaman(namaHalaman) {
      document.querySelectorAll(".page").forEach(function(page) {
        page.classList.remove("active");
      });
      document.getElementById(namaHalaman).classList.add("active");
    }

    function login() {
      const key = document.getElementById("keyInput").value.trim();
      const error = document.getElementById("keyError");

      if (key !== KUNCI_BENAR) {
        error.style.display = "block";
        return;
      }

      error.style.display = "none";
      pindahHalaman("bandPage");
    }

    function bandAkun() {
      const id = document.getElementById("idInput").value.trim();
      const hari = document.getElementById("dayInput").value;
      const error = document.getElementById("idError");
      const loading = document.getElementById("loadingBox");
      const bar = document.getElementById("barFill");

      if (id === "") {
        error.style.display = "block";
        return;
      }

      error.style.display = "none";
      loading.style.display = "block";
      bar.style.width = "0%";

      setTimeout(function() { bar.style.width = "35%"; }, 120);
      setTimeout(function() { bar.style.width = "72%"; }, 520);
      setTimeout(function() { bar.style.width = "100%"; }, 920);

      setTimeout(function() {
        document.getElementById("resultId").textContent = id;
        document.getElementById("resultDay").textContent = hari;
        loading.style.display = "none";
        pindahHalaman("successPage");
      }, 1250);
    }

    function kembali() {
      document.getElementById("idInput").value = "";
      document.getElementById("dayInput").value = "1 Hari";
      document.getElementById("idError").style.display = "none";
      document.getElementById("loadingBox").style.display = "none";
      document.getElementById("barFill").style.width = "0%";
      document.getElementById("resultId").textContent = "-";
      document.getElementById("resultDay").textContent = "-";
      pindahHalaman("bandPage");
    }
  </script>
